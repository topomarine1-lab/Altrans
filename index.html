<!DOCTYPE html>
<html lang="fr" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#10b981">
<title>SubTopo Transform - Coordinate Converter</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

<script src="https://cdn.jsdelivr.net/npm/proj4@2.9.0/dist/proj4.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #071f1c;
  min-height: 100vh;
  color: #fff;
  overflow-x: hidden;
}
body.rtl { direction: rtl; }

#loginOverlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  z-index: 99999;
  background: linear-gradient(135deg, #071f1c 0%, #0a2e2a 50%, #071f1c 100%);
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
#loginOverlay.hidden { display: none !important; }

.login-box {
  background: #0f3a35; border: 1px solid #1a5f56;
  border-radius: 20px; padding: 40px 30px;
  max-width: 400px; width: 100%; text-align: center;
}
.login-logo {
  width: 80px; height: 80px; border-radius: 20px; margin: 0 auto 20px;
  background: linear-gradient(135deg, #fff, #e8f5e9);
  display: flex; align-items: center; justify-content: center; font-size: 46px;
}
.login-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
.login-sub { font-size: 13px; color: #a7f3d0; margin-bottom: 30px; }
.login-box input {
  width: 100%; padding: 14px 16px; background: #0a2e2a; color: #fff;
  border: 1px solid #1a5f56; border-radius: 12px;
  font-size: 15px; margin-bottom: 12px; text-align: center; letter-spacing: 3px;
}
.login-btn {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, #10b981, #059669);
  color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; letter-spacing: 1px;
}
.login-error { color: #ef4444; font-size: 13px; margin-top: 10px; min-height: 18px; }
.login-footer { margin-top: 24px; padding-top: 20px; border-top: 1px solid #1a5f56; font-size: 11px; color: #a7f3d0; }

.lang-selector { display: flex; gap: 6px; justify-content: center; margin-bottom: 20px; }
.lang-btn {
  background: #0a2e2a; border: 1px solid #1a5f56;
  color: #a7f3d0; padding: 8px 14px; border-radius: 8px;
  font-size: 12px; cursor: pointer; font-weight: 600;
}
.lang-btn.active { background: #10b981; color: #fff; }

.app-container { display: none; }
.app-container.visible { display: block; }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; background: #0a2e2a;
  border-bottom: 1px solid #1a5f56; position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.logo-icon {
  width: 46px; height: 46px; border-radius: 12px;
  background: linear-gradient(135deg, #fff, #d1fae5);
  display: flex; align-items: center; justify-content: center; font-size: 26px;
}
.logo-text h1 { font-size: 15px; font-weight: 800; color: #fff; }
.logo-text p { font-size: 10px; color: #a7f3d0; margin-top: 2px; }
.header-right { display: flex; gap: 6px; }
.icon-btn {
  background: transparent; border: 1px solid #1a5f56;
  color: #a7f3d0; padding: 8px 10px; border-radius: 8px; cursor: pointer;
}

.transform-container {
  display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; padding: 16px;
}
@media (max-width: 900px) {
  .transform-container { grid-template-columns: 1fr; }
  .transform-arrow { transform: rotate(90deg); }
}

.coord-card {
  background: #0f3a35; border: 2px solid #1a5f56;
  border-radius: 14px; padding: 20px;
}
.coord-card.source { border-color: #10b981; }
.coord-card.target { border-color: #f59e0b; }

.card-title {
  font-size: 13px; font-weight: 700; color: #34d399;
  text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.target .card-title { color: #fcd34d; }

.transform-arrow {
  display: flex; align-items: center; justify-content: center;
  font-size: 40px; color: #10b981;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.1); opacity: 0.7; }
}

.field { margin-bottom: 14px; }
label {
  display: block; font-size: 11px; font-weight: 700; color: #34d399;
  text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px;
}
input, select {
  width: 100%; padding: 10px 12px; background: #0a2e2a; color: #fff;
  border: 1px solid #1a5f56; border-radius: 8px; font-size: 13px;
}
input:focus, select:focus { outline: none; border-color: #10b981; }
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }

.coord-type-tabs {
  display: flex; background: #0a2e2a; border-radius: 8px; padding: 4px;
  margin-bottom: 14px; gap: 4px;
}
.coord-type-tabs button {
  flex: 1; padding: 8px; border: none; background: transparent;
  color: #a7f3d0; font-size: 11px; font-weight: 600; cursor: pointer; border-radius: 6px;
}
.coord-type-tabs button.active { background: #10b981; color: #fff; }

.coord-input { display: none; }
.coord-input.active { display: block; }

.btn {
  width: 100%; padding: 14px; border: none; border-radius: 10px;
  font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px;
}
.btn-primary { background: #10b981; color: #fff; }
.btn-outline { background: transparent; color: #fff; border: 1px solid #1a5f56; }

.transform-btn {
  background: linear-gradient(135deg, #10b981, #059669);
  color: #fff; padding: 16px; border-radius: 12px;
  font-size: 16px; font-weight: 800; cursor: pointer; border: none;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 4px 20px rgba(16,185,129,.5);
}

.result-display {
  background: rgba(16,185,129,.1); border: 1px solid #10b981;
  border-radius: 8px; padding: 10px; margin-top: 8px;
  font-family: 'Courier New', monospace; font-size: 13px;
}

.toolbar {
  display: flex; gap: 8px; padding: 12px 16px; background: #0a2e2a;
  border-bottom: 1px solid #1a5f56; overflow-x: auto;
}
.toolbar button {
  background: #0f3a35; border: 1px solid #1a5f56; color: #a7f3d0;
  padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 6px;
}
.toolbar button:hover { background: #1a5f56; color: #fff; }

.params-section {
  background: #0f3a35; border: 1px solid #1a5f56;
  border-radius: 12px; padding: 16px; margin: 16px;
}
.params-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 600px) { .params-grid { grid-template-columns: 1fr; } }

.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: #0f3a35; color: #fff; padding: 14px 24px; border-radius: 10px;
  border: 1px solid #10b981; z-index: 1000; transition: transform .4s;
  font-weight: 600; font-size: 14px;
}
.toast.show { transform: translateX(-50%) translateY(0); }

footer {
  text-align: center; padding: 16px; font-size: 11px; color: #a7f3d0;
  border-top: 1px solid #1a5f56; margin-top: 20px;
}

.history-panel {
  background: #0f3a35; border-radius: 10px; padding: 14px; margin: 16px;
  max-height: 300px; overflow-y: auto;
}
.history-item {
  background: #0a2e2a; padding: 10px; border-radius: 8px; margin-bottom: 8px;
  font-family: 'Courier New', monospace; font-size: 12px; cursor: pointer;
}
.history-item:hover { background: #1a5f56; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">🗺️</div>
    <div class="login-title" data-i18n="appTitle">SubTopo Transform</div>
    <div class="login-sub" data-i18n="loginSub">Coordinate Converter</div>
    
    <div class="lang-selector">
      <button class="lang-btn active" data-lang="fr" onclick="setLang('fr')">🇫🇷 FR</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">🇬🇧 EN</button>
      <button class="lang-btn" data-lang="ar" onclick="setLang('ar')">🇸🇦 AR</button>
    </div>
    
    <input type="password" id="pwdInput" placeholder="Mot de passe" autocomplete="off">
    <button class="login-btn" id="loginBtn">🔓 SE CONNECTER</button>
    <div class="login-error" id="pwdError"></div>
    <div class="login-footer">© 2025 SubTopo Engineering<br><b style="color:#34d399">NASRAOUI FATHI</b></div>
  </div>
</div>

<!-- APP -->
<div class="app-container" id="appContainer">

<header>
  <div class="logo">
    <div class="logo-icon">🗺️</div>
    <div class="logo-text">
      <h1>SubTopo Transform</h1>
      <p>Coordinate Converter</p>
    </div>
  </div>
  <div class="header-right">
    <button class="icon-btn" id="newBtn" title="Nouveau">📄</button>
    <button class="icon-btn" id="logoutBtn" title="Quitter">🚪</button>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <button id="swapBtn">🔄 Swap</button>
  <button id="resetBtn">🔁 Reset</button>
  <button id="historyBtn">📋 Historique</button>
  <button id="exportPdfBtn">📑 PDF</button>
  <button id="exportCsvBtn">📊 CSV</button>
  <button id="paramsBtn">⚙️ 7-Param</button>
</div>

<!-- TRANSFORMATION ZONE -->
<div class="transform-container">
  
  <!-- SOURCE -->
  <div class="coord-card source">
    <div class="card-title">📍 <span data-i18n="sourceSystem">Système Source</span></div>
    
    <div class="row-2">
      <div class="field">
        <label>EPSG Code</label>
        <input type="text" id="src_epsg" value="32634">
      </div>
      <div class="field">
        <label>Zone</label>
        <select id="src_zone">
          <option value="world">World</option>
          <option value="europe">Europe</option>
          <option value="africa">Africa</option>
          <option value="asia">Asia</option>
        </select>
      </div>
    </div>
    
    <div class="field">
      <label data-i18n="datum">Datum géodésique</label>
      <select id="src_datum">
        <option value="WGS84" selected>WGS84 (WGS84)</option>
        <option value="ED50">ED50 (International 1924)</option>
        <option value="NAD83">NAD83</option>
        <option value="NAD27">NAD27</option>
        <option value="ETRS89">ETRS89</option>
        <option value="GDA94">GDA94 (Australia)</option>
        <option value="Tokyo">Tokyo Datum</option>
        <option value="Carthage">Carthage (Tunisia)</option>
        <option value="Nord_Sahara">Nord Sahara 1959 (Algeria)</option>
        <option value="Merchich">Merchich (Morocco)</option>
      </select>
    </div>
    
    <div class="field">
      <label data-i18n="projection">Projection</label>
      <select id="src_projection">
        <option value="utm" selected>UTM Zone 34N</option>
        <option value="lambert">Lambert Conformal Conic</option>
        <option value="mercator">Mercator</option>
        <option value="albers">Albers Equal-Area</option>
        <option value="stereographic">Stereographic</option>
      </select>
    </div>
    
    <div class="coord-type-tabs">
      <button class="active" data-type="utm" onclick="switchCoordType('src', 'utm')">UTM/Plane</button>
      <button data-type="dms" onclick="switchCoordType('src', 'dms')">DMS</button>
      <button data-type="dec" onclick="switchCoordType('src', 'dec')">Decimal</button>
    </div>
    
    <!-- UTM/Plane Input -->
    <div class="coord-input active" id="src_utm">
      <div class="field">
        <label>Point Name</label>
        <input type="text" id="src_name" value="NoName">
      </div>
      <div class="field">
        <label>East [m]</label>
        <input type="number" step="0.0001" id="src_east" placeholder="374987.3650">
      </div>
      <div class="field">
        <label>North [m]</label>
        <input type="number" step="0.0001" id="src_north" placeholder="3288986.3530">
      </div>
      <div class="field">
        <label>Ell. Height [m]</label>
        <input type="number" step="0.0001" id="src_height" placeholder="-27.1880">
      </div>
    </div>
    
    <!-- DMS Input -->
    <div class="coord-input" id="src_dms">
      <div class="field">
        <label>Longitude (° ' ")</label>
        <div class="row-3">
          <input type="number" id="src_lon_deg" placeholder="19">
          <input type="number" id="src_lon_min" placeholder="42">
          <input type="number" step="0.0001" id="src_lon_sec" placeholder="29.117">
        </div>
      </div>
      <div class="field">
        <label>Latitude (° ' ")</label>
        <div class="row-3">
          <input type="number" id="src_lat_deg" placeholder="29">
          <input type="number" id="src_lat_min" placeholder="43">
          <input type="number" step="0.0001" id="src_lat_sec" placeholder="33.245">
        </div>
      </div>
    </div>
    
    <!-- Decimal Input -->
    <div class="coord-input" id="src_dec">
      <div class="field">
        <label>Longitude (°)</label>
        <input type="number" step="0.0000001" id="src_lon_dec" placeholder="19.7081">
      </div>
      <div class="field">
        <label>Latitude (°)</label>
        <input type="number" step="0.0000001" id="src_lat_dec" placeholder="29.7259">
      </div>
    </div>
  </div>
  
  <!-- ARROW -->
  <div class="transform-arrow">
    <button class="transform-btn" id="transformBtn">
      ➡️ <span data-i18n="transform">TRANSFORM</span>
    </button>
  </div>
  
  <!-- TARGET -->
  <div class="coord-card target">
    <div class="card-title">🎯 <span data-i18n="targetSystem">Système Cible</span></div>
    
    <div class="row-2">
      <div class="field">
        <label>EPSG Code</label>
        <input type="text" id="tgt_epsg" value="4326">
      </div>
      <div class="field">
        <label>Zone</label>
        <select id="tgt_zone">
          <option value="europe" selected>Europe</option>
          <option value="world">World</option>
          <option value="africa">Africa</option>
          <option value="asia">Asia</option>
        </select>
      </div>
    </div>
    
    <div class="field">
      <label data-i18n="datum">Datum géodésique</label>
      <select id="tgt_datum">
        <option value="WGS84" selected>WGS84 (WGS84)</option>
        <option value="ED50">ED50 (International 1924)</option>
        <option value="NAD83">NAD83</option>
        <option value="NAD27">NAD27</option>
        <option value="ETRS89">ETRS89</option>
        <option value="GDA94">GDA94 (Australia)</option>
        <option value="Carthage">Carthage (Tunisia)</option>
        <option value="Nord_Sahara">Nord Sahara 1959 (Algeria)</option>
      </select>
    </div>
    
    <div class="field">
      <label data-i18n="projection">Projection</label>
      <select id="tgt_projection">
        <option value="geographic" selected>Geographic (Lat/Lng)</option>
        <option value="utm">UTM Zone 34N</option>
        <option value="lambert">Lambert Conformal Conic</option>
        <option value="mercator">Mercator</option>
      </select>
    </div>
    
    <div class="coord-type-tabs">
      <button data-type="utm" onclick="switchCoordType('tgt', 'utm')">UTM/Plane</button>
      <button class="active" data-type="dms" onclick="switchCoordType('tgt', 'dms')">DMS</button>
      <button data-type="dec" onclick="switchCoordType('tgt', 'dec')">Decimal</button>
    </div>
    
    <!-- Results UTM -->
    <div class="coord-input" id="tgt_utm">
      <div class="field">
        <label>East [m]</label>
        <div class="result-display" id="tgt_east">-</div>
      </div>
      <div class="field">
        <label>North [m]</label>
        <div class="result-display" id="tgt_north">-</div>
      </div>
      <div class="field">
        <label>Ell. Height [m]</label>
        <div class="result-display" id="tgt_height">-</div>
      </div>
    </div>
    
    <!-- Results DMS -->
    <div class="coord-input active" id="tgt_dms">
      <div class="field">
        <label>Longitude (° ' ")</label>
        <div class="result-display" id="tgt_lon_dms">-</div>
      </div>
      <div class="field">
        <label>Latitude (° ' ")</label>
        <div class="result-display" id="tgt_lat_dms">-</div>
      </div>
      <div class="field">
        <label>Ell. Height [m]</label>
        <div class="result-display" id="tgt_height_dms">-</div>
      </div>
    </div>
    
    <!-- Results Decimal -->
    <div class="coord-input" id="tgt_dec">
      <div class="field">
        <label>Longitude (°)</label>
        <div class="result-display" id="tgt_lon_dec">-</div>
      </div>
      <div class="field">
        <label>Latitude (°)</label>
        <div class="result-display" id="tgt_lat_dec">-</div>
      </div>
    </div>
  </div>
</div>

<!-- 7-PARAMETERS SECTION -->
<div class="params-section" id="paramsSection" style="display:none;">
  <div class="card-title">⚙️ <span data-i18n="params7">Transformation 7 Paramètres (Bursa-Wolf)</span></div>
  
  <div class="params-grid">
    <div class="field">
      <label>X0 (translation X) [m]</label>
      <input type="number" step="0.001" id="param_x0" value="0">
    </div>
    <div class="field">
      <label>Y0 (translation Y) [m]</label>
      <input type="number" step="0.001" id="param_y0" value="0">
    </div>
    <div class="field">
      <label>Z0 (translation Z) [m]</label>
      <input type="number" step="0.001" id="param_z0" value="0">
    </div>
    <div class="field">
      <label>ex (rotation X) ["]</label>
      <input type="number" step="0.000001" id="param_ex" value="0">
    </div>
    <div class="field">
      <label>ey (rotation Y) ["]</label>
      <input type="number" step="0.000001" id="param_ey" value="0">
    </div>
    <div class="field">
      <label>ez (rotation Z) ["]</label>
      <input type="number" step="0.000001" id="param_ez" value="0">
    </div>
    <div class="field">
      <label>m (scale factor) [ppm]</label>
      <input type="number" step="0.0001" id="param_m" value="0">
    </div>
    <div class="field">
      <label>&nbsp;</label>
      <button class="btn btn-outline" id="closeParamsBtn">✖ Fermer</button>
    </div>
  </div>
</div>

<!-- HISTORY -->
<div class="history-panel" id="historyPanel" style="display:none;">
  <div class="card-title">📋 Historique des transformations</div>
  <div id="historyList"></div>
</div>

<footer>© 2025 SubTopo Engineering — <b>NASRAOUI FATHI</b></footer>

</div>

<div class="toast" id="toast"></div>

<script>
// ============ TRANSLATIONS ============
const I18N = {
  fr: {
    appTitle: 'SubTopo Transform',
    loginSub: 'Coordinate Converter',
    sourceSystem: 'Système Source',
    targetSystem: 'Système Cible',
    datum: 'Datum géodésique',
    projection: 'Projection',
    transform: 'TRANSFORMER',
    params7: 'Transformation 7 Paramètres (Bursa-Wolf)'
  },
  en: {
    appTitle: 'SubTopo Transform',
    loginSub: 'Coordinate Converter',
    sourceSystem: 'Source System',
    targetSystem: 'Target System',
    datum: 'Geodetic Datum',
    projection: 'Projection',
    transform: 'TRANSFORM',
    params7: '7-Parameter Transformation (Bursa-Wolf)'
  },
  ar: {
    appTitle: 'محول الإحداثيات',
    loginSub: 'تحويل الإحداثيات',
    sourceSystem: 'النظام المصدر',
    targetSystem: 'النظام الهدف',
    datum: 'المرجع الجيوديسي',
    projection: 'الإسقاط',
    transform: 'تحويل',
    params7: 'تحويل 7 معاملات'
  }
};

let currentLang = localStorage.getItem('transform_lang') || 'fr';
let history = JSON.parse(localStorage.getItem('transform_history') || '[]');

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('transform_lang', lang);
  document.getElementById('htmlRoot').setAttribute('lang', lang);
  document.body.classList.toggle('rtl', lang === 'ar');
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (I18N[lang] && I18N[lang][key]) el.textContent = I18N[lang][key];
  });
}

// ============ PASSWORD ============
const APP_PASSWORD = 'Subtopo@2025';

function tryLogin() {
  const input = document.getElementById('pwdInput');
  const err = document.getElementById('pwdError');
  if (input.value.trim() === APP_PASSWORD) {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('appContainer').classList.add('visible');
    err.textContent = '';
    setTimeout(() => toast('✅ Bienvenue !'), 300);
  } else {
    err.textContent = '❌ Mot de passe incorrect';
    input.value = '';
    setTimeout(() => err.textContent = '', 3000);
  }
}

function logout() {
  if (confirm('Quitter ?')) {
    document.getElementById('loginOverlay').classList.remove('hidden');
    document.getElementById('appContainer').classList.remove('visible');
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============ COORDINATE TYPE SWITCHER ============
function switchCoordType(side, type) {
  document.querySelectorAll(`.coord-card.${side === 'src' ? 'source' : 'target'} .coord-type-tabs button`)
    .forEach(b => b.classList.toggle('active', b.dataset.type === type));
  document.querySelectorAll(`.coord-card.${side === 'src' ? 'source' : 'target'} .coord-input`)
    .forEach(el => el.classList.remove('active'));
  document.getElementById(`${side}_${type}`).classList.add('active');
}

// ============ DMS / DECIMAL CONVERSION ============
function dmsToDecimal(deg, min, sec) {
  return parseFloat(deg) + parseFloat(min)/60 + parseFloat(sec)/3600;
}

function decimalToDMS(decimal) {
  const abs = Math.abs(decimal);
  const deg = Math.floor(abs);
  const min = Math.floor((abs - deg) * 60);
  const sec = ((abs - deg) * 60 - min) * 60;
  return { deg, min, sec, formatted: `${deg}° ${min}' ${sec.toFixed(4)}"` };
}

// ============ TRANSFORMATION ============
function transform() {
  try {
    // Récupérer EPSG codes
    const srcEpsg = document.getElementById('src_epsg').value;
    const tgtEpsg = document.getElementById('tgt_epsg').value;
    
    // Définir les projections proj4
    proj4.defs('EPSG:' + srcEpsg, getProjDef(srcEpsg));
    proj4.defs('EPSG:' + tgtEpsg, getProjDef(tgtEpsg));
    
    // Récupérer coordonnées source
    let srcCoords;
    const srcType = document.querySelector('.coord-card.source .coord-type-tabs button.active').dataset.type;
    
    if (srcType === 'utm') {
      const east = parseFloat(document.getElementById('src_east').value);
      const north = parseFloat(document.getElementById('src_north').value);
      if (isNaN(east) || isNaN(north)) {
        toast('❌ Saisir East et North');
        return;
      }
      srcCoords = [east, north];
    } else if (srcType === 'dms') {
      const lon = dmsToDecimal(
        document.getElementById('src_lon_deg').value || 0,
        document.getElementById('src_lon_min').value || 0,
        document.getElementById('src_lon_sec').value || 0
      );
      const lat = dmsToDecimal(
        document.getElementById('src_lat_deg').value || 0,
        document.getElementById('src_lat_min').value || 0,
        document.getElementById('src_lat_sec').value || 0
      );
      srcCoords = [lon, lat];
    } else {
      const lon = parseFloat(document.getElementById('src_lon_dec').value);
      const lat = parseFloat(document.getElementById('src_lat_dec').value);
      if (isNaN(lon) || isNaN(lat)) {
        toast('❌ Saisir Lat/Lng');
        return;
      }
      srcCoords = [lon, lat];
    }
    
    // Transformation avec proj4
    const result = proj4('EPSG:' + srcEpsg, 'EPSG:' + tgtEpsg, srcCoords);
    
    // Afficher résultats
    const tgtType = document.querySelector('.coord-card.target .coord-type-tabs button.active').dataset.type;
    
    if (tgtType === 'utm') {
      document.getElementById('tgt_east').textContent = result[0].toFixed(4) + ' m';
      document.getElementById('tgt_north').textContent = result[1].toFixed(4) + ' m';
      document.getElementById('tgt_height').textContent = (parseFloat(document.getElementById('src_height').value) || 0).toFixed(4) + ' m';
    } else if (tgtType === 'dms') {
      const lonDMS = decimalToDMS(result[0]);
      const latDMS = decimalToDMS(result[1]);
      document.getElementById('tgt_lon_dms').textContent = lonDMS.formatted + ' ' + (result[0] >= 0 ? 'E' : 'W');
      document.getElementById('tgt_lat_dms').textContent = latDMS.formatted + ' ' + (result[1] >= 0 ? 'N' : 'S');
      document.getElementById('tgt_height_dms').textContent = (parseFloat(document.getElementById('src_height').value) || 0).toFixed(4) + ' m';
    } else {
      document.getElementById('tgt_lon_dec').textContent = result[0].toFixed(7) + '°';
      document.getElementById('tgt_lat_dec').textContent = result[1].toFixed(7) + '°';
    }
    
    // Ajouter à l'historique
    addToHistory({
      date: new Date().toISOString(),
      srcEpsg, tgtEpsg, srcCoords, result
    });
    
    toast('✅ Transformation réussie');
  } catch (e) {
    console.error(e);
    toast('❌ Erreur: ' + e.message);
  }
}

function getProjDef(epsg) {
  // Définitions Proj4 pour différents EPSG codes
  const defs = {
    '4326': '+proj=longlat +datum=WGS84 +no_defs',
    '4258': '+proj=longlat +ellps=GRS80 +no_defs', // ETRS89
    '4230': '+proj=longlat +ellps=intl +no_defs', // ED50
    '32630': '+proj=utm +zone=30 +datum=WGS84 +units=m +no_defs',
    '32631': '+proj=utm +zone=31 +datum=WGS84 +units=m +no_defs',
    '32632': '+proj=utm +zone=32 +datum=WGS84 +units=m +no_defs',
    '32633': '+proj=utm +zone=33 +datum=WGS84 +units=m +no_defs',
    '32634': '+proj=utm +zone=34 +datum=WGS84 +units=m +no_defs',
    '32635': '+proj=utm +zone=35 +datum=WGS84 +units=m +no_defs',
    '32636': '+proj=utm +zone=36 +datum=WGS84 +units=m +no_defs',
    '32637': '+proj=utm +zone=37 +datum=WGS84 +units=m +no_defs',
    '32638': '+proj=utm +zone=38 +datum=WGS84 +units=m +no_defs',
    '32639': '+proj=utm +zone=39 +datum=WGS84 +units=m +no_defs',
    '32640': '+proj=utm +zone=40 +datum=WGS84 +units=m +no_defs',
    '22332': '+proj=utm +zone=32 +ellps=clrk80ign +towgs84=-263,6,431,0,0,0,0 +units=m +no_defs', // Carthage
    '22392': '+proj=lcc +lat_1=36 +lat_2=33.3 +lat_0=36 +lon_0=10.166666666666666 +x_0=500135 +y_0=300000 +ellps=clrk80ign +units=m +no_defs',
    '3035': '+proj=laea +lat_0=52 +lon_0=10 +x_0=4321000 +y_0=3210000 +ellps=GRS80 +units=m +no_defs', // ETRS89 LAEA
    '2154': '+proj=lcc +lat_1=49 +lat_2=44 +lat_0=46.5 +lon_0=3 +x_0=700000 +y_0=6600000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs', // RGF93 Lambert-93
  };
  return defs[epsg] || `+proj=utm +zone=34 +datum=WGS84 +units=m +no_defs`;
}

// ============ HISTORY ============
function addToHistory(item) {
  history.unshift(item);
  if (history.length > 20) history = history.slice(0, 20);
  localStorage.setItem('transform_history', JSON.stringify(history));
}

function showHistory() {
  const panel = document.getElementById('historyPanel');
  const list = document.getElementById('historyList');
  
  if (panel.style.display === 'none') {
    panel.style.display = 'block';
    list.innerHTML = history.map((h, i) => `
      <div class="history-item" onclick="loadFromHistory(${i})">
        <b>${new Date(h.date).toLocaleString('fr-FR')}</b><br>
        EPSG ${h.srcEpsg} → EPSG ${h.tgtEpsg}<br>
        ${h.srcCoords.map(c => c.toFixed(4)).join(', ')}<br>
        → ${h.result.map(c => c.toFixed(4)).join(', ')}
      </div>
    `).join('') || '<p style="color:#a7f3d0;">Aucun historique</p>';
  } else {
    panel.style.display = 'none';
  }
}

function loadFromHistory(index) {
  const h = history[index];
  document.getElementById('src_epsg').value = h.srcEpsg;
  document.getElementById('tgt_epsg').value = h.tgtEpsg;
  document.getElementById('src_east').value = h.srcCoords[0];
  document.getElementById('src_north').value = h.srcCoords[1];
  document.getElementById('historyPanel').style.display = 'none';
  toast('✅ Chargé depuis l\'historique');
}

// ============ SWAP / RESET ============
function swap() {
  // Échanger source et target EPSG
  const srcEpsg = document.getElementById('src_epsg').value;
  document.getElementById('src_epsg').value = document.getElementById('tgt_epsg').value;
  document.getElementById('tgt_epsg').value = srcEpsg;
  toast('🔄 Systèmes échangés');
}

function reset() {
  if (!confirm('Réinitialiser tous les champs ?')) return;
  document.querySelectorAll('input').forEach(i => {
    if (i.type !== 'password') i.value = '';
  });
  document.querySelectorAll('.result-display').forEach(r => r.textContent = '-');
  toast('🔁 Réinitialisé');
}

// ============ EXPORT ============
function exportPDF() {
  if (!window.jspdf) { toast('❌ jsPDF non chargé'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  
  doc.setFillColor(10, 46, 42);
  doc.rect(0, 0, 210, 30, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(16);
  doc.setFont('helvetica', 'bold');
  doc.text('SubTopo Transform', 15, 14);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.text('Rapport de Transformation de Coordonnées', 15, 22);
  
  let y = 42;
  doc.setTextColor(0, 0, 0);
  doc.setFontSize(11);
  doc.text('Date: ' + new Date().toLocaleString('fr-FR'), 15, y);
  y += 10;
  
  doc.setFont('helvetica', 'bold');
  doc.text('Source:', 15, y); y += 6;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.text('EPSG: ' + document.getElementById('src_epsg').value, 18, y); y += 5;
  doc.text('East: ' + (document.getElementById('src_east').value || '-'), 18, y); y += 5;
  doc.text('North: ' + (document.getElementById('src_north').value || '-'), 18, y); y += 10;
  
  doc.setFont('helvetica', 'bold');
  doc.text('Target:', 15, y); y += 6;
  doc.setFont('helvetica', 'normal');
  doc.text('EPSG: ' + document.getElementById('tgt_epsg').value, 18, y); y += 5;
  doc.text('Result: ' + document.getElementById('tgt_lon_dms').textContent, 18, y); y += 5;
  doc.text('         ' + document.getElementById('tgt_lat_dms').textContent, 18, y); y += 10;
  
  doc.setFillColor(10, 46, 42);
  doc.rect(0, 287, 210, 10, 'F');
  doc.setFontSize(8);
  doc.setTextColor(255, 255, 255);
  doc.text('SubTopo Engineering - NASRAOUI FATHI', 105, 293, { align: 'center' });
  
  doc.save('transform-' + Date.now() + '.pdf');
  toast('✅ PDF exporté');
}

function exportCSV() {
  let content = 'SubTopo Transform - Export\n';
  content += 'Date,' + new Date().toLocaleString('fr-FR') + '\n\n';
  content += 'Source EPSG,' + document.getElementById('src_epsg').value + '\n';
  content += 'Source East,' + document.getElementById('src_east').value + '\n';
  content += 'Source North,' + document.getElementById('src_north').value + '\n\n';
  content += 'Target EPSG,' + document.getElementById('tgt_epsg').value + '\n';
  content += 'Target Lon,' + document.getElementById('tgt_lon_dms').textContent + '\n';
  content += 'Target Lat,' + document.getElementById('tgt_lat_dms').textContent + '\n';
  
  const blob = new Blob([content], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'transform-' + Date.now() + '.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('✅ CSV exporté');
}

  setLang(currentLang);
  
  document.getElementById('loginBtn').addEventListener('click', tryLogin);
  document.getElementById('pwdInput').addEventListener('keypress', e => { if (e.key === 'Enter') tryLogin(); });
  document.getElementById('pwdInput').focus();
  
  document.getElementById('logoutBtn').addEventListener('click', logout);
  document.getElementById('newBtn').addEventListener('click', reset);
  document.getElementById('transformBtn').addEventListener('click', transform);
  document.getElementById('swapBtn').addEventListener('click', swap);
  document.getElementById('resetBtn').addEventListener('click', reset);
  document.getElementById('historyBtn').addEventListener('click', showHistory);
  document.getElementById('exportPdfBtn').addEventListener('click', exportPDF);
  document.getElementById('exportCsvBtn').addEventListener('click', exportCSV);
  document.getElementById('paramsBtn').addEventListener('click', () => {
    const s = document.getElementById('paramsSection');
    s.style.display = s.style.display === 'none' ? 'block' : 'none';
  });
  document.getElementById('closeParamsBtn').addEventListener('click', () => {
    document.getElementById('paramsSection').style.display = 'none';
  });
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
